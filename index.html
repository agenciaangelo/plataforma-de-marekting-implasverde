<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Implasverde | Central Inteligente de Marketing</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Playfair+Display:wght@700;800&display=swap" rel="stylesheet">
  <style>
    :root{
      --ink:#10131b;--muted:#6d7484;--soft:#f6f7fb;--paper:rgba(255,255,255,.76);--line:rgba(16,19,27,.10);
      --gold:#f2c76e;--coral:#ff805d;--green:#21b66f;--blue:#4b7bff;--violet:#9a6cff;
      --shadow:0 24px 70px rgba(24,32,56,.13);--radius:26px;
    }
    *{box-sizing:border-box} body{margin:0;font-family:Inter,system-ui,sans-serif;color:var(--ink);background:
      radial-gradient(circle at 8% 8%,rgba(255,128,93,.22),transparent 30%),
      radial-gradient(circle at 78% 4%,rgba(75,123,255,.20),transparent 26%),
      radial-gradient(circle at 70% 80%,rgba(33,182,111,.18),transparent 30%),#f6f7fb;min-height:100vh;overflow-x:hidden}
    .app{display:grid;grid-template-columns:292px 1fr;min-height:100vh}.sidebar{position:sticky;top:0;height:100vh;padding:24px 18px;background:linear-gradient(180deg,#10131b,#151a27 62%,#0c0f15);color:white;overflow:hidden}.sidebar:before{content:"";position:absolute;inset:-70px -80px auto auto;width:230px;height:230px;background:radial-gradient(circle,rgba(242,199,110,.32),transparent 67%);filter:blur(2px)}
    .brand{position:relative;padding:20px;border:1px solid rgba(255,255,255,.1);border-radius:28px;background:rgba(255,255,255,.06);backdrop-filter:blur(16px);box-shadow:0 20px 60px rgba(0,0,0,.22)}
    .brand .eyebrow,.eyebrow{font-size:11px;letter-spacing:.16em;text-transform:uppercase;font-weight:800;color:rgba(255,255,255,.56)}.logo{margin-top:8px;font-family:'Playfair Display',serif;font-size:28px;line-height:.98}.brand p{margin:8px 0 0;color:rgba(255,255,255,.58);font-size:12px;line-height:1.5}.nav{position:relative;margin-top:24px;display:grid;gap:8px}.nav button{border:0;width:100%;cursor:pointer;text-align:left;padding:13px 14px;border-radius:18px;background:transparent;color:rgba(255,255,255,.62);font-weight:700;display:flex;gap:12px;align-items:center;transition:.2s}.nav button:hover{background:rgba(255,255,255,.08);color:white;transform:translateX(2px)}.nav button.active{background:linear-gradient(135deg,rgba(255,255,255,.17),rgba(255,255,255,.07));color:#fff;box-shadow:inset 0 0 0 1px rgba(255,255,255,.12)}.badge{margin-left:auto;background:var(--coral);color:white;padding:2px 8px;border-radius:999px;font-size:11px}.sidebar-footer{position:absolute;left:18px;right:18px;bottom:20px;padding:18px;border:1px solid rgba(255,255,255,.09);border-radius:24px;background:rgba(255,255,255,.055)}.avatar{width:36px;height:36px;border-radius:14px;background:linear-gradient(135deg,var(--green),var(--blue));display:grid;place-items:center;font-weight:900}.team{display:flex;gap:10px;align-items:center}.team strong{font-size:13px}.team span{font-size:11px;color:rgba(255,255,255,.55)}
    main{padding:28px;max-width:1500px;width:100%;margin:0 auto}.topbar{display:flex;justify-content:space-between;gap:20px;align-items:center;margin-bottom:22px}.title h1{margin:6px 0 7px;font-family:'Playfair Display',serif;font-size:44px;letter-spacing:-.04em;line-height:1}.title p{margin:0;color:var(--muted);font-size:14px}.actions{display:flex;gap:10px}.btn{border:1px solid var(--line);background:rgba(255,255,255,.72);padding:12px 16px;border-radius:16px;font-weight:800;color:#202431;cursor:pointer;box-shadow:0 10px 26px rgba(24,32,56,.08);transition:.2s}.btn:hover{transform:translateY(-2px);box-shadow:0 16px 34px rgba(24,32,56,.13)}.btn.primary{border:0;color:#fff;background:linear-gradient(135deg,#10131b,#30384d)}
    .page{display:none;animation:enter .34s ease}.page.active{display:block}@keyframes enter{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}.hero{display:grid;grid-template-columns:1.25fr .75fr;gap:20px;margin-bottom:20px}.panel,.card{border:1px solid rgba(255,255,255,.68);background:var(--paper);backdrop-filter:blur(22px);box-shadow:var(--shadow);border-radius:var(--radius)}.panel{padding:26px}.hero-card{position:relative;overflow:hidden;min-height:260px;background:linear-gradient(135deg,rgba(255,255,255,.88),rgba(255,255,255,.52))}.hero-card:after{content:"";position:absolute;right:-80px;top:-90px;width:280px;height:280px;border-radius:50%;background:conic-gradient(from 180deg,var(--gold),var(--coral),var(--blue),var(--green),var(--gold));opacity:.22;filter:blur(1px)}.hero h2{font-family:'Playfair Display',serif;font-size:36px;line-height:1.02;letter-spacing:-.04em;margin:0 0 14px;max-width:620px}.hero p{color:var(--muted);line-height:1.7;margin:0 0 22px}.pill-row{display:flex;flex-wrap:wrap;gap:8px}.pill{display:inline-flex;align-items:center;gap:7px;padding:8px 11px;border-radius:999px;background:rgba(255,255,255,.7);border:1px solid var(--line);font-size:12px;font-weight:800;color:#303646}.glow-dot{width:8px;height:8px;border-radius:50%;background:var(--green);box-shadow:0 0 16px var(--green)}
    .grid-4{display:grid;grid-template-columns:repeat(4,1fr);gap:16px}.grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}.grid-2{display:grid;grid-template-columns:repeat(2,1fr);gap:16px}.metric{padding:20px;overflow:hidden;position:relative}.metric:before{content:"";position:absolute;inset:auto -40px -55px auto;width:150px;height:150px;border-radius:50%;background:var(--accent,rgba(75,123,255,.18));opacity:.28}.label{font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);font-weight:900}.value{font-size:34px;font-weight:900;letter-spacing:-.04em;margin:8px 0 2px}.sub{font-size:12px;color:var(--muted)}.section-title{display:flex;justify-content:space-between;align-items:end;margin:28px 0 14px}.section-title h3{font-size:18px;margin:0;letter-spacing:-.02em}.section-title p{margin:4px 0 0;color:var(--muted);font-size:13px}.insight{display:flex;gap:12px;padding:16px;border-radius:22px;background:linear-gradient(135deg,rgba(16,19,27,.96),rgba(35,42,61,.96));color:white;margin-bottom:10px}.insight small{color:rgba(255,255,255,.56);font-weight:800;text-transform:uppercase;letter-spacing:.12em}.insight p{margin:5px 0 0;color:rgba(255,255,255,.76);font-size:13px;line-height:1.5}.iconbox{width:42px;height:42px;border-radius:16px;display:grid;place-items:center;background:rgba(255,255,255,.12);flex:0 0 auto}.bar{height:10px;background:rgba(16,19,27,.08);border-radius:999px;overflow:hidden}.bar span{display:block;height:100%;border-radius:999px;background:linear-gradient(90deg,var(--green),var(--blue));width:60%}.brand-tag{padding:6px 10px;border-radius:999px;font-size:11px;font-weight:900}.estacao{background:#fff0e9;color:#ba4c2b}.cj{background:#eef2ff;color:#385bd6}.implas{background:#eafbf2;color:#12824b}.status{padding:6px 10px;border-radius:999px;font-size:11px;font-weight:900;background:#fff7e5;color:#ac7419}.status.ok{background:#e9fbf2;color:#16884d}.status.bad{background:#fff0ee;color:#b3422b}.list{display:grid;gap:10px}.row{display:flex;align-items:center;gap:12px;padding:14px;border:1px solid var(--line);border-radius:20px;background:rgba(255,255,255,.58)}.row-title{font-weight:900;font-size:14px}.row-sub{color:var(--muted);font-size:12px;margin-top:4px}.spacer{flex:1}.calendar{display:grid;grid-template-columns:repeat(7,1fr);gap:10px}.day{min-height:112px;padding:11px;border:1px solid var(--line);border-radius:20px;background:rgba(255,255,255,.64)}.day-num{font-weight:900;color:#818897;font-size:12px;margin-bottom:7px}.event{padding:8px;border-radius:14px;font-size:11px;font-weight:800;margin-top:6px;line-height:1.25}.event.estacao{background:#fff0e9;color:#93401f}.event.cj{background:#eef2ff;color:#2946a5}.event.implas{background:#eafbf2;color:#0d6d3e}.form-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:14px}.field label{display:block;font-size:12px;font-weight:900;color:#535b6d;margin-bottom:7px}.field input,.field select,.field textarea{width:100%;border:1px solid var(--line);background:rgba(255,255,255,.72);border-radius:16px;padding:13px;font-family:Inter;font-size:13px;outline:none}.field textarea{resize:vertical;min-height:98px}.kanban{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}.column{padding:14px;border-radius:24px;background:rgba(255,255,255,.45);border:1px solid rgba(255,255,255,.7)}.column h4{margin:4px 4px 12px}.task{padding:15px;border-radius:20px;background:rgba(255,255,255,.82);border:1px solid var(--line);margin-bottom:10px;box-shadow:0 10px 30px rgba(24,32,56,.07)}.chart-row{display:grid;grid-template-columns:150px 1fr 60px;gap:12px;align-items:center;margin:15px 0}.ai-box{background:linear-gradient(135deg,#111621,#25304b);color:white;border-radius:30px;padding:24px;box-shadow:var(--shadow);position:relative;overflow:hidden}.ai-box:after{content:"";position:absolute;right:-80px;top:-80px;width:240px;height:240px;background:radial-gradient(circle,var(--violet),transparent 65%);opacity:.34}.ai-box textarea{position:relative;width:100%;min-height:132px;border:1px solid rgba(255,255,255,.12);background:rgba(255,255,255,.08);color:white;border-radius:22px;padding:16px;font-family:Inter;outline:none;resize:vertical}.ai-result{white-space:pre-line;line-height:1.7;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12);border-radius:22px;padding:18px;margin-top:14px;color:rgba(255,255,255,.82)}.timeline{position:relative;display:grid;gap:14px}.step{display:grid;grid-template-columns:64px 1fr;gap:16px;align-items:start}.step-number{width:54px;height:54px;border-radius:20px;display:grid;place-items:center;color:white;font-weight:900;background:linear-gradient(135deg,var(--blue),var(--violet));box-shadow:0 14px 30px rgba(75,123,255,.24)}.step-card{padding:20px;border-radius:24px;background:rgba(255,255,255,.74);border:1px solid rgba(255,255,255,.85);box-shadow:0 12px 36px rgba(24,32,56,.08)}.step-card h4{margin:0 0 8px;font-size:16px}.step-card p{margin:0;color:var(--muted);line-height:1.65;font-size:13px}.deliverables{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px}.deliverables span{padding:6px 9px;border-radius:999px;background:#f3f5fb;font-size:11px;font-weight:900;color:#4c5364}.method{background:linear-gradient(135deg,rgba(255,255,255,.82),rgba(255,255,255,.45));padding:28px;border-radius:30px;border:1px solid rgba(255,255,255,.82);box-shadow:var(--shadow)}.method h2{font-family:'Playfair Display',serif;font-size:38px;line-height:1.02;margin:0 0 12px}.method p{color:var(--muted);line-height:1.7}.mobile-menu{display:none}
    @media(max-width:1100px){.app{grid-template-columns:1fr}.sidebar{display:none}.mobile-menu{display:flex;gap:8px;overflow:auto;padding:12px}.grid-4,.grid-3,.grid-2,.hero,.kanban{grid-template-columns:1fr}.calendar{grid-template-columns:repeat(2,1fr)}main{padding:18px}.title h1{font-size:34px}.topbar{display:block}.actions{margin-top:14px;flex-wrap:wrap}.form-grid{grid-template-columns:1fr}}
  </style>
</head>
<body>
<div class="app">
  <aside class="sidebar">
    <div class="brand"><div class="eyebrow">Grupo</div><div class="logo">Implasverde</div><p>Central Inteligente de Marketing para gestão criativa, aprovação e performance das marcas do grupo.</p></div>
    <nav class="nav" id="nav"></nav>
    <div class="sidebar-footer"><div class="team"><div class="avatar">AI</div><div><strong>Marketing Core</strong><br><span>Jullya • Binho • Gestores</span></div></div></div>
  </aside>
  <main>
    <div class="mobile-menu" id="mobileNav"></div>
    <section id="dashboard" class="page active"></section>
    <section id="calendar" class="page"></section>
    <section id="briefings" class="page"></section>
    <section id="approvals" class="page"></section>
    <section id="performance" class="page"></section>
    <section id="ai" class="page"></section>
    <section id="process" class="page"></section>
  </main>
</div>
<script>
const brands={estacao:{name:'Restaurante Estação',tag:'estacao'},cj:{name:'CJ Home Center',tag:'cj'},implas:{name:'Implasverde Indústria',tag:'implas'}};
const navItems=[['dashboard','Visão Executiva','◆'],['calendar','Calendário','◌'],['briefings','Briefings','□'],['approvals','Aprovações','✓'],['performance','Performance','▰'],['ai','IA Estratégica','✦'],['process','Implantação','↗']];
const events=[
[5,'estacao','Prato do dia premium','Publicado'],[6,'cj','Promoção de porcelanatos','Aprovado'],[7,'implas','Linha ecológica','Em criação'],[8,'estacao','Bastidores da cozinha','Aguardando aprovação'],[10,'implas','Tour pela fábrica','Aguardando aprovação'],[12,'estacao','Menu de fim de semana','Aprovado'],[13,'cj','Linha jardim','Em criação'],[15,'implas','Certificação ISO','Aguardando aprovação'],[17,'cj','Como escolher tintas','Publicado'],[19,'estacao','Campanha aniversário','Reprovado'],[21,'implas','Cliente B2B','Aprovado']
];
function tag(b){return `<span class="brand-tag ${brands[b].tag}">${brands[b].name}</span>`}
function status(s){let c=s==='Aprovado'||s==='Publicado'?'ok':s==='Reprovado'?'bad':'';return `<span class="status ${c}">${s}</span>`}
function top(title,sub){return `<div class="topbar"><div class="title"><div class="label">Central Inteligente de Marketing</div><h1>${title}</h1><p>${sub}</p></div><div class="actions"><button class="btn">Exportar relatório</button><button class="btn primary">Nova demanda</button></div></div>`}
function renderNav(){const n=document.getElementById('nav'),m=document.getElementById('mobileNav');n.innerHTML=m.innerHTML=navItems.map(i=>`<button data-page="${i[0]}" class="${i[0]==='dashboard'?'active':''}"><span>${i[2]}</span>${i[1]}${i[0]==='approvals'?'<span class="badge">3</span>':''}</button>`).join('');document.querySelectorAll('[data-page]').forEach(b=>b.onclick=()=>showPage(b.dataset.page));}
function showPage(id){document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));document.getElementById(id).classList.add('active');document.querySelectorAll('[data-page]').forEach(b=>b.classList.toggle('active',b.dataset.page===id));window.scrollTo({top:0,behavior:'smooth'});}
function metric(label,value,sub,color){return `<div class="card metric" style="--accent:${color}"><div class="label">${label}</div><div class="value">${value}</div><div class="sub">${sub}</div></div>`}
function dashboard(){document.getElementById('dashboard').innerHTML=top('Visão Executiva','Operação de marketing das 3 marcas em uma experiência premium, clara e orientada a decisão.')+`
<div class="hero"><div class="panel hero-card"><div class="label">Marketing Command Center</div><h2>Uma operação mais previsível, inteligente e escalável.</h2><p>O painel transforma volume de demandas, aprovações, produção e performance em leitura executiva. A equipe sai do improviso e passa a operar com clareza, prioridade e inteligência.</p><div class="pill-row"><span class="pill"><i class="glow-dot"></i> 88 posts no mês</span><span class="pill">3 marcas ativas</span><span class="pill">2 criativos</span><span class="pill">IA aplicada ao fluxo</span></div></div><div class="panel"><div class="label">Insight da semana</div><div class="insight"><div class="iconbox">✦</div><div><small>IA Estratégica</small><p>CJ Home Center performa melhor com conteúdos educativos. Recomenda-se aumentar tutoriais e reduzir posts puramente promocionais.</p></div></div><div class="insight"><div class="iconbox">⚡</div><div><small>Gargalo detectado</small><p>Aprovações acima de 48h reduzem a previsibilidade do calendário editorial.</p></div></div></div></div>
<div class="grid-4">${metric('Posts produzidos','88','meta mensal: 90','rgba(33,182,111,.55)')}${metric('Tempo médio aprovação','36h','ideal: até 24h','rgba(255,128,93,.55)')}${metric('Capacidade usada','92%','operação próxima do limite','rgba(75,123,255,.55)')}${metric('Horas otimizadas por IA','18h','estimativa mensal','rgba(154,108,255,.55)')}</div>
<div class="section-title"><div><h3>Gargalos e oportunidades</h3><p>Leitura executiva para decisão rápida.</p></div></div><div class="grid-3"><div class="panel"><div class="label">Aprovação</div><div class="value">3</div><p class="sub">peças aguardando decisão dos gestores.</p><div class="bar"><span style="width:72%;background:linear-gradient(90deg,var(--coral),var(--gold))"></span></div></div><div class="panel"><div class="label">Retrabalho</div><div class="value">1</div><p class="sub">conteúdo reprovado por falta de alinhamento inicial.</p><div class="bar"><span style="width:38%;background:linear-gradient(90deg,var(--coral),var(--violet))"></span></div></div><div class="panel"><div class="label">Expansão</div><div class="value">+1</div><p class="sub">marca suportada com estrutura e IA, sem contratação imediata.</p><div class="bar"><span style="width:84%"></span></div></div></div>
<div class="section-title"><div><h3>Próximas entregas</h3><p>Demandas críticas dos próximos dias.</p></div></div><div class="list">${events.slice(1,6).map(e=>`<div class="row"><div class="iconbox" style="background:#fff">${e[0]}</div><div><div class="row-title">${e[2]}</div><div class="row-sub">${brands[e[1]].name}</div></div><span class="spacer"></span>${tag(e[1])}${status(e[3])}</div>`).join('')}</div>`}
function calendar(){document.getElementById('calendar').innerHTML=top('Calendário Editorial','Planejamento visual das entregas por marca, status e prioridade.')+`<div class="panel"><div class="calendar">${['Seg','Ter','Qua','Qui','Sex','Sáb','Dom'].map(d=>`<div class="label" style="text-align:center">${d}</div>`).join('')}${Array.from({length:30},(_,i)=>i+1).map(d=>{const es=events.filter(e=>e[0]===d);return `<div class="day"><div class="day-num">${d}</div>${es.map(e=>`<div class="event ${brands[e[1]].tag}">${e[2]}</div>`).join('')}</div>`}).join('')}</div></div>`}
function briefings(){const data=[['estacao','Campanha Dia dos Pais','Feed + Stories','20/06','Em criação'],['cj','Lançamento linha jardim','Reels + Feed','15/06','Aguardando aprovação'],['implas','Relatório de sustentabilidade','Carrossel','25/06','Aprovado'],['estacao','Menu de inverno','Feed','10/06','Publicado']];document.getElementById('briefings').innerHTML=top('Briefings Inteligentes','Entrada padronizada de demandas para reduzir retrabalho e acelerar produção.')+`<div class="panel"><div class="form-grid"><div class="field"><label>Empresa</label><select><option>Restaurante Estação</option><option>CJ Home Center</option><option>Implasverde Indústria</option></select></div><div class="field"><label>Tipo de conteúdo</label><select><option>Feed</option><option>Reels</option><option>Stories</option><option>Campanha completa</option></select></div><div class="field"><label>Objetivo da demanda</label><input placeholder="Ex: divulgar lançamento, promover venda, fortalecer marca"></div><div class="field"><label>Prazo</label><input type="date"></div><div class="field" style="grid-column:1/-1"><label>Informações estratégicas</label><textarea placeholder="Público, oferta, argumento principal, referências visuais e observações do gestor..."></textarea></div></div><br><button class="btn primary">Enviar briefing estruturado</button></div><div class="section-title"><div><h3>Demandas ativas</h3><p>Briefings em produção e aprovação.</p></div></div><div class="list">${data.map(d=>`<div class="row"><div><div class="row-title">${d[1]}</div><div class="row-sub">${d[2]} • prazo ${d[3]}</div></div><span class="spacer"></span>${tag(d[0])}${status(d[4])}</div>`).join('')}</div>`}
function approvals(){const cols={ 'Aguardando aprovação':events.filter(e=>e[3]==='Aguardando aprovação'), 'Aprovados':events.filter(e=>e[3]==='Aprovado'||e[3]==='Publicado').slice(0,4), 'Revisão':events.filter(e=>e[3]==='Reprovado')};document.getElementById('approvals').innerHTML=top('Fluxo de Aprovação','Decisão rápida, histórico claro e menos ruído entre criação e diretoria.')+`<div class="kanban">${Object.entries(cols).map(([k,items])=>`<div class="column"><h4>${k}</h4>${items.map(e=>`<div class="task"><div class="row-title">${e[2]}</div><div class="row-sub">${brands[e[1]].name}</div><br>${tag(e[1])} ${status(e[3])}<div style="margin-top:14px;display:flex;gap:8px"><button class="btn" style="padding:8px 10px">Revisar</button><button class="btn primary" style="padding:8px 10px">Aprovar</button></div></div>`).join('')}</div>`).join('')}</div>`}
function performance(){document.getElementById('performance').innerHTML=top('Performance das Marcas','Indicadores consolidados para orientar conteúdo, investimento e prioridade.')+`<div class="grid-3">${[['estacao','48.2k','6.8%','+184'],['cj','31.7k','4.2%','+97'],['implas','22.4k','5.1%','+62']].map(d=>`<div class="panel">${tag(d[0])}<div class="value">${d[1]}</div><p class="sub">alcance mensal • engajamento ${d[2]} • seguidores ${d[3]}</p><div class="bar"><span style="width:${parseFloat(d[1])*1.7}%"></span></div></div>`).join('')}</div><div class="section-title"><div><h3>Leitura comparativa</h3><p>O que os dados indicam para a gestão.</p></div></div><div class="grid-2"><div class="panel"><div class="label">Conteúdo com melhor resposta</div><h2 style="margin:10px 0 6px">Educativo e bastidores</h2><p class="sub">Conteúdos de orientação e rotina geram maior retenção do que publicações puramente comerciais.</p></div><div class="panel"><div class="label">Recomendação</div><h2 style="margin:10px 0 6px">Planejamento quinzenal</h2><p class="sub">A operação ganha previsibilidade quando campanhas são definidas antes da semana de produção.</p></div></div>`}
function ai(){document.getElementById('ai').innerHTML=top('IA Estratégica','Assistente para pautas, legendas, roteiros, campanhas e diagnóstico de performance.')+`<div class="ai-box"><div class="label" style="color:rgba(255,255,255,.62)">Prompt estratégico</div><h2 style="font-family:'Playfair Display',serif;font-size:34px;margin:8px 0 14px">Crie, analise e otimize conteúdos por marca.</h2><textarea id="prompt" placeholder="Ex: Gere 5 ideias de Reels para a CJ Home Center com foco em dicas práticas de reforma..."></textarea><br><br><button class="btn primary" onclick="generateAI()">✦ Gerar demonstração</button><div id="aiResult" class="ai-result" style="display:none"></div></div>`}

function process(){const steps=[['01','Diagnóstico Operacional','Mapeamento das demandas, canais de entrada, aprovações, volume mensal e gargalos atuais.',['Mapa da operação','Riscos','Indicadores-base']],['02','Arquitetura Estratégica','Definição do fluxo ideal, papéis, status, indicadores e estrutura de governança das 3 marcas.',['Fluxo oficial','KPIs','Padrão de briefing']],['03','Design da Plataforma','Construção da experiência visual premium, navegação, dashboards e módulos operacionais.',['Interface','Protótipo','Design system']],['04','Implantação Técnica','Desenvolvimento do ambiente, páginas, banco de dados, permissões, integração e testes funcionais.',['HTML/App','Banco de dados','Acessos']],['05','Inteligência Artificial','Criação de assistentes por marca para legendas, roteiros, pautas, campanhas e insights executivos.',['Prompts','IA por marca','Automações']],['06','Gestão e Escala','Rotina de uso, relatórios, melhorias contínuas e expansão para novas marcas, módulos e integrações.',['Treinamento','Relatórios','Roadmap']]];document.getElementById('process').innerHTML=top('Processo de Criação e Implantação','Uma metodologia clara para transformar o protótipo em uma plataforma real de gestão de marketing.')+`<div class="method"><div class="label">Método Orbit</div><h2>Da operação dispersa para uma central inteligente, implantada por etapas.</h2><p>O processo foi desenhado para causar impacto executivo, validar valor rapidamente e evoluir a plataforma com segurança técnica e ganho operacional progressivo.</p></div><div class="section-title"><div><h3>Etapas de implantação</h3><p>Estrutura profissional para apresentação ao gestor.</p></div></div><div class="timeline">${steps.map(s=>`<div class="step"><div class="step-number">${s[0]}</div><div class="step-card"><h4>${s[1]}</h4><p>${s[2]}</p><div class="deliverables">${s[3].map(x=>`<span>${x}</span>`).join('')}</div></div></div>`).join('')}</div>`}
renderNav();dashboard();calendar();briefings();approvals();performance();ai();process();
