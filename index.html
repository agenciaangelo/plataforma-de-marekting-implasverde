<style>
:root{--ink:#263238;--muted:#6f777d;--line:rgba(68,126,42,.16);--paper:rgba(255,255,255,.86);--shadow:0 22px 58px rgba(43,93,26,.13);--green:#5faa38;--green-dark:#2f6f1f;--green-soft:#eaf4e4;--lime:#7cc242;--blue:#4f8a35;--coral:#6fb247;--gold:#8fbd52;--violet:#3e7e2a;--radius:22px}*{box-sizing:border-box}body{margin:0;font-family:'Open Sans',Arial,sans-serif;color:var(--ink);background:radial-gradient(circle at 12% 10%,rgba(95,170,56,.18),transparent 32%),radial-gradient(circle at 82% 8%,rgba(124,194,66,.14),transparent 28%),radial-gradient(circle at 72% 80%,rgba(47,111,31,.10),transparent 34%),#f5f7f2;min-height:100vh;overflow-x:hidden}.app{display:grid;grid-template-columns:292px 1fr;min-height:100vh}.sidebar{position:sticky;top:0;height:100vh;padding:24px 18px;background:linear-gradient(180deg,#4f982f,#5faa38 46%,#357922);color:white;overflow:hidden}.sidebar:before{content:"";position:absolute;right:-80px;top:-70px;width:230px;height:230px;background:radial-gradient(circle,rgba(242,199,110,.32),transparent 67%);filter:blur(2px)}.brand{position:relative;padding:20px;border:1px solid rgba(255,255,255,.10);border-radius:28px;background:rgba(255,255,255,.06);backdrop-filter:blur(16px);box-shadow:0 20px 60px rgba(0,0,0,.22)}.eyebrow,.brand .eyebrow{font-size:11px;letter-spacing:.16em;text-transform:uppercase;font-weight:900;color:rgba(255,255,255,.58)}.logo{margin-top:8px;font-family:'Montserrat',Arial,sans-serif;font-size:27px;line-height:1;font-weight:800;font-style:italic}.brand p{margin:9px 0 0;color:rgba(255,255,255,.62);font-size:12px;line-height:1.55}.nav{position:relative;margin-top:24px;display:grid;gap:8px}.nav button,.mobile-menu button{border:0;width:100%;cursor:pointer;text-align:left;padding:13px 14px;border-radius:18px;background:transparent;color:rgba(255,255,255,.64);font-weight:800;display:flex;gap:12px;align-items:center;transition:.2s}.nav button:hover,.nav button.active{background:linear-gradient(135deg,rgba(255,255,255,.17),rgba(255,255,255,.07));color:white;transform:translateX(2px);box-shadow:inset 0 0 0 1px rgba(255,255,255,.12)}.badge{margin-left:auto;background:var(--coral);color:white;padding:2px 8px;border-radius:999px;font-size:11px}.sidebar-footer{position:absolute;left:18px;right:18px;bottom:20px;padding:18px;border:1px solid rgba(255,255,255,.09);border-radius:24px;background:rgba(255,255,255,.055)}.team{display:flex;gap:10px;align-items:center}.avatar{width:36px;height:36px;border-radius:14px;background:linear-gradient(135deg,var(--green),var(--blue));display:grid;place-items:center;font-weight:900}.team strong{font-size:13px}.team span{font-size:11px;color:rgba(255,255,255,.58)}main{padding:28px;max-width:1500px;width:100%;margin:0 auto}.mobile-menu{display:none}.topbar{display:flex;justify-content:space-between;gap:20px;align-items:center;margin-bottom:22px}.label{font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);font-weight:900}.title h1{margin:6px 0 7px;font-family:'Montserrat',Arial,sans-serif;font-size:36px;letter-spacing:-.02em;line-height:1.12;text-transform:uppercase}.title p{margin:0;color:var(--muted);font-size:14px}.actions{display:flex;gap:10px}.btn{border:1px solid var(--line);background:rgba(255,255,255,.72);padding:12px 16px;border-radius:16px;font-weight:900;color:#202431;cursor:pointer;box-shadow:0 10px 26px rgba(24,32,56,.08);transition:.2s}.btn:hover{transform:translateY(-2px);box-shadow:0 16px 34px rgba(24,32,56,.13)}.btn.primary{border:0;color:white;background:linear-gradient(135deg,#3d8528,#61aa3b)}.page{display:none;animation:enter .34s ease}.page.active{display:block}@keyframes enter{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}.panel,.card{border:1px solid rgba(255,255,255,.70);background:var(--paper);backdrop-filter:blur(22px);box-shadow:var(--shadow);border-radius:var(--radius)}.panel{padding:26px}.hero{display:grid;grid-template-columns:1.25fr .75fr;gap:20px;margin-bottom:20px}.hero-card{position:relative;overflow:hidden;min-height:260px;background:linear-gradient(135deg,rgba(255,255,255,.90),rgba(255,255,255,.54))}.hero-card:after{content:"";position:absolute;right:-80px;top:-90px;width:280px;height:280px;border-radius:50%;background:conic-gradient(from 180deg,#2f6f1f,#5faa38,#8fbd52,#5faa38,#2f6f1f);opacity:.22}.hero h2{font-family:'Montserrat',Arial,sans-serif;font-size:32px;line-height:1.12;letter-spacing:-.02em;text-transform:uppercase;margin:0 0 14px;max-width:620px}.hero p{color:var(--muted);line-height:1.7;margin:0 0 22px}.pill-row{display:flex;flex-wrap:wrap;gap:8px}.pill{display:inline-flex;align-items:center;gap:7px;padding:8px 11px;border-radius:999px;background:rgba(255,255,255,.72);border:1px solid var(--line);font-size:12px;font-weight:900;color:#303646}.glow-dot{width:8px;height:8px;border-radius:50%;background:var(--green);box-shadow:0 0 16px var(--green)}.grid-4{display:grid;grid-template-columns:repeat(4,1fr);gap:16px}.grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}.grid-2{display:grid;grid-template-columns:repeat(2,1fr);gap:16px}.metric{padding:20px;overflow:hidden;position:relative}.metric:before{content:"";position:absolute;right:-40px;bottom:-55px;width:150px;height:150px;border-radius:50%;background:var(--accent);opacity:.28}.value{font-size:34px;font-weight:900;letter-spacing:-.04em;margin:8px 0 2px}.sub{font-size:12px;color:var(--muted)}.section-title{display:flex;justify-content:space-between;align-items:end;margin:28px 0 14px}.section-title h3{font-size:18px;margin:0;letter-spacing:-.02em}.section-title p{margin:4px 0 0;color:var(--muted);font-size:13px}.insight{display:flex;gap:12px;padding:16px;border-radius:22px;background:linear-gradient(135deg,#3f8428,#5faa38);color:white;margin-bottom:10px}.insight small{color:rgba(255,255,255,.56);font-weight:900;text-transform:uppercase;letter-spacing:.12em}.insight p{margin:5px 0 0;color:rgba(255,255,255,.76);font-size:13px;line-height:1.5}.iconbox{width:42px;height:42px;border-radius:16px;display:grid;place-items:center;background:rgba(255,255,255,.12);flex:0 0 auto}.bar{height:10px;background:rgba(16,19,27,.08);border-radius:999px;overflow:hidden}.bar span{display:block;height:100%;border-radius:999px;background:linear-gradient(90deg,var(--green),var(--blue));width:60%}.brand-tag{display:inline-block;padding:6px 10px;border-radius:999px;font-size:11px;font-weight:900}.estacao{background:#eef6ea;color:#3f8428}.cj{background:#f1f7ed;color:#4f8a35}.implas{background:#e6f3df;color:#2f6f1f}.status{display:inline-block;padding:6px 10px;border-radius:999px;font-size:11px;font-weight:900;background:#fff7e5;color:#ac7419}.status.ok{background:#e9fbf2;color:#16884d}.status.bad{background:#fff0ee;color:#b3422b}.list{display:grid;gap:10px}.row{display:flex;align-items:center;gap:12px;padding:14px;border:1px solid var(--line);border-radius:20px;background:rgba(255,255,255,.58)}.row-title{font-weight:900;font-size:14px}.row-sub{color:var(--muted);font-size:12px;margin-top:4px}.spacer{flex:1}.calendar{display:grid;grid-template-columns:repeat(7,1fr);gap:10px}.day{min-height:112px;padding:11px;border:1px solid var(--line);border-radius:20px;background:rgba(255,255,255,.64)}.day-num{font-weight:900;color:#818897;font-size:12px;margin-bottom:7px}.event{padding:8px;border-radius:14px;font-size:11px;font-weight:900;margin-top:6px;line-height:1.25}.event.estacao{background:#eef6ea;color:#3f8428}.event.cj{background:#f1f7ed;color:#4f8a35}.event.implas{background:#e6f3df;color:#2f6f1f}.form-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:14px}.field label{display:block;font-size:12px;font-weight:900;color:#535b6d;margin-bottom:7px}.field input,.field select,.field textarea{width:100%;border:1px solid var(--line);background:rgba(255,255,255,.72);border-radius:16px;padding:13px;font-family:'Open Sans';font-size:13px;outline:none}.field textarea{resize:vertical;min-height:98px}.kanban{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}.column{padding:14px;border-radius:24px;background:rgba(255,255,255,.45);border:1px solid rgba(255,255,255,.7)}.column h4{margin:4px 4px 12px}.task{padding:15px;border-radius:20px;background:rgba(255,255,255,.82);border:1px solid var(--line);margin-bottom:10px;box-shadow:0 10px 30px rgba(24,32,56,.07)}.ai-box{background:linear-gradient(135deg,#316f20,#5faa38);color:white;border-radius:30px;padding:24px;box-shadow:var(--shadow);position:relative;overflow:hidden}.ai-box:after{content:"";position:absolute;right:-80px;top:-80px;width:240px;height:240px;background:radial-gradient(circle,var(--violet),transparent 65%);opacity:.34}.ai-box textarea{position:relative;width:100%;min-height:132px;border:1px solid rgba(255,255,255,.12);background:rgba(255,255,255,.08);color:white;border-radius:22px;padding:16px;font-family:'Open Sans';outline:none;resize:vertical}.ai-result{white-space:pre-line;line-height:1.7;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12);border-radius:22px;padding:18px;margin-top:14px;color:rgba(255,255,255,.82)}.method{padding:28px;border-radius:32px;background:linear-gradient(135deg,#316f20,#5faa38);color:white;box-shadow:var(--shadow);position:relative;overflow:hidden}.method:after{content:"";position:absolute;right:-60px;top:-80px;width:250px;height:250px;background:conic-gradient(#2f6f1f,#5faa38,#8fbd52,#5faa38,#2f6f1f);border-radius:50%;opacity:.22}.method h2{font-family:'Montserrat',Arial,sans-serif;font-size:32px;margin:8px 0 12px;text-transform:uppercase;max-width:800px}.method p{color:rgba(255,255,255,.70);max-width:820px;line-height:1.7}.timeline{display:grid;gap:14px}.step{display:grid;grid-template-columns:64px 1fr;gap:16px;align-items:start}.step-number{width:54px;height:54px;border-radius:20px;display:grid;place-items:center;background:linear-gradient(135deg,var(--green),var(--blue));color:white;font-weight:900;box-shadow:0 16px 35px rgba(75,123,255,.22)}.step-card{padding:20px;border-radius:24px;background:rgba(255,255,255,.72);border:1px solid rgba(255,255,255,.74);box-shadow:0 12px 34px rgba(24,32,56,.08)}.step-card h4{margin:0 0 7px;font-size:18px}.step-card p{margin:0;color:var(--muted);line-height:1.55}.deliverables{display:flex;flex-wrap:wrap;gap:8px;margin-top:14px}.deliverables span{padding:7px 10px;border-radius:999px;background:white;border:1px solid var(--line);font-size:12px;font-weight:900;color:#343b4e}@media(max-width:1100px){.app{grid-template-columns:1fr}.sidebar{display:none}.mobile-menu{display:flex;gap:8px;overflow:auto;padding:12px 0}.mobile-menu button{white-space:nowrap;background:rgba(16,19,27,.08);color:#222;width:auto}.mobile-menu button.active{background:#10131b;color:#fff}.grid-4,.grid-3,.grid-2,.hero,.kanban{grid-template-columns:1fr}.calendar{grid-template-columns:repeat(2,1fr)}main{padding:18px}.title h1{font-size:34px}.topbar{display:block}.actions{margin-top:14px;flex-wrap:wrap}.form-grid{grid-template-columns:1fr}}
</style>

<body>
<div class="app">

<script>
document.addEventListener('DOMContentLoaded',function(){
const brands={estacao:{name:'Restaurante Estação',tag:'estacao'},cj:{name:'CJ Home Center',tag:'cj'},implas:{name:'Implasverde Indústria',tag:'implas'}};
const events=[[5,'estacao','Prato do dia premium','Publicado'],[6,'cj','Promoção de porcelanatos','Aprovado'],[7,'implas','Linha ecológica','Em criação'],[8,'estacao','Bastidores da cozinha','Aguardando aprovação'],[10,'implas','Tour pela fábrica','Aguardando aprovação'],[12,'estacao','Menu de fim de semana','Aprovado'],[13,'cj','Linha jardim','Em criação'],[15,'implas','Certificação ISO','Aguardando aprovação'],[17,'cj','Como escolher tintas','Publicado'],[19,'estacao','Campanha aniversário','Reprovado'],[21,'implas','Cliente B2B','Aprovado']];
function tag(b){return '<span class="brand-tag '+brands[b].tag+'">'+brands[b].name+'</span>'}
function status(s){var c=(s==='Aprovado'||s==='Publicado')?'ok':(s==='Reprovado'?'bad':'');return '<span class="status '+c+'">'+s+'</span>'}
function top(title,sub){return '<div class="topbar"><div class="title"><div class="label">Central Inteligente de Marketing</div><h1>'+title+'</h1><p>'+sub+'</p></div><div class="actions"><button class="btn">Exportar relatório</button><button class="btn primary">Nova demanda</button></div></div>'}
function metric(label,value,sub,color){return '<div class="card metric" style="--accent:'+color+'"><div class="label">'+label+'</div><div class="value">'+value+'</div><div class="sub">'+sub+'</div></div>'}
function dashboard(){document.getElementById('dashboard').innerHTML=top('Central de Marketing','Gestão integrada das marcas do grupo, com leitura executiva simples, fluxo organizado e apoio de inteligência artificial.')+'<div class="panel" style="padding:34px 36px;margin-bottom:18px;background:rgba(255,255,255,.82);box-shadow:0 16px 42px rgba(47,111,31,.08)"><div style="display:grid;grid-template-columns:1.35fr .65fr;gap:30px;align-items:center"><div><div class="label">Operação integrada</div><h2 style="font-family:Montserrat,Arial,sans-serif;font-size:34px;line-height:1.14;margin:10px 0 12px;text-transform:uppercase;color:#243224;max-width:720px">Uma central limpa para planejar, aprovar e acompanhar o marketing das três marcas.</h2><p style="margin:0;color:var(--muted);font-size:15px;line-height:1.75;max-width:720px">A plataforma organiza demandas, reduz ruídos de aprovação e entrega uma visão objetiva da produção criativa do grupo.</p></div><div style="display:grid;gap:10px"><div class="pill" style="justify-content:space-between;background:#f6fbf3"><span>Restaurante Estação</span><span style="color:var(--green-dark);font-weight:900">ativo</span></div><div class="pill" style="justify-content:space-between;background:#f6fbf3"><span>CJ Home Center</span><span style="color:var(--green-dark);font-weight:900">ativo</span></div><div class="pill" style="justify-content:space-between;background:#f6fbf3"><span>Implasverde Indústria</span><span style="color:var(--green-dark);font-weight:900">ativo</span></div></div></div></div><div class="grid-4" style="margin-bottom:18px">'+metric('Posts no mês','88','meta: 90','rgba(95,170,56,.32)')+metric('Aprovações pendentes','3','aguardando gestores','rgba(95,170,56,.25)')+metric('Briefings ativos','4','demandas estruturadas','rgba(95,170,56,.25)')+metric('IA aplicada','18h','economia estimada','rgba(95,170,56,.25)')+'</div><div class="grid-2"><div class="panel" style="box-shadow:0 14px 34px rgba(47,111,31,.07)"><div class="section-title" style="margin:0 0 14px"><div><h3>Leitura rápida</h3><p>Indicadores principais para acompanhamento da operação.</p></div></div><div class="list"><div class="row"><div><div class="row-title">Produção dentro da meta mensal</div><div class="row-sub">88 de 90 conteúdos previstos para o mês.</div></div><span class="spacer"></span><span class="status ok">estável</span></div><div class="row"><div><div class="row-title">Aprovação ainda é o principal gargalo</div><div class="row-sub">3 conteúdos dependem de decisão dos gestores.</div></div><span class="spacer"></span><span class="status">atenção</span></div><div class="row"><div><div class="row-title">Briefings mais estruturados reduzem retrabalho</div><div class="row-sub">Entrada padronizada melhora prazo, clareza e execução.</div></div><span class="spacer"></span><span class="status ok">ganho</span></div></div></div><div class="panel" style="box-shadow:0 14px 34px rgba(47,111,31,.07)"><div class="section-title" style="margin:0 0 14px"><div><h3>Próximas entregas</h3><p>Demandas que precisam de atenção nesta semana.</p></div></div><div class="list">'+events.slice(1,5).map(function(e){return '<div class="row"><div><div class="row-title">'+e[2]+'</div><div class="row-sub">'+brands[e[1]].name+'</div></div><span class="spacer"></span>'+status(e[3])+'</div>'}).join('')+'</div></div></div>'}
function calendar(){document.getElementById('calendar').innerHTML=top('Calendário Editorial','Planejamento visual das entregas por marca, status e prioridade.')+'<div class="panel"><div class="calendar">'+['Seg','Ter','Qua','Qui','Sex','Sáb','Dom'].map(function(d){return '<div class="label" style="text-align:center">'+d+'</div>'}).join('')+Array.from({length:30},function(_,i){var d=i+1,es=events.filter(function(e){return e[0]===d});return '<div class="day"><div class="day-num">'+d+'</div>'+es.map(function(e){return '<div class="event '+brands[e[1]].tag+'">'+e[2]+'</div>'}).join('')+'</div>'}).join('')+'</div></div>'}
function briefings(){var data=[['estacao','Campanha Dia dos Pais','Feed + Stories','20/06','Em criação'],['cj','Lançamento linha jardim','Reels + Feed','15/06','Aguardando aprovação'],['implas','Relatório de sustentabilidade','Carrossel','25/06','Aprovado'],['estacao','Menu de inverno','Feed','10/06','Publicado']];document.getElementById('briefings').innerHTML=top('Briefings Inteligentes','Entrada padronizada de demandas para reduzir retrabalho e acelerar produção.')+'<div class="panel"><div class="form-grid"><div class="field"><label>Empresa</label><select><option>Restaurante Estação</option><option>CJ Home Center</option><option>Implasverde Indústria</option></select></div><div class="field"><label>Tipo de conteúdo</label><select><option>Feed</option><option>Reels</option><option>Stories</option><option>Campanha completa</option></select></div><div class="field"><label>Objetivo da demanda</label><input placeholder="Ex: divulgar lançamento, promover venda, fortalecer marca"></div><div class="field"><label>Prazo</label><input type="date"></div><div class="field" style="grid-column:1/-1"><label>Informações estratégicas</label><textarea placeholder="Público, oferta, argumento principal, referências visuais e observações do gestor..."></textarea></div></div><br><button class="btn primary">Enviar briefing estruturado</button></div><div class="section-title"><div><h3>Demandas ativas</h3><p>Briefings em produção e aprovação.</p></div></div><div class="list">'+data.map(function(d){return '<div class="row"><div><div class="row-title">'+d[1]+'</div><div class="row-sub">'+d[2]+' • prazo '+d[3]+'</div></div><span class="spacer"></span>'+tag(d[0])+status(d[4])+'</div>'}).join('')+'</div>'}
function approvals(){var waiting=events.filter(e=>e[3]==='Aguardando aprovação'), approved=events.filter(e=>e[3]==='Aprovado'||e[3]==='Publicado').slice(0,4), review=events.filter(e=>e[3]==='Reprovado');var cols=[['Aguardando aprovação',waiting],['Aprovados',approved],['Revisão',review]];document.getElementById('approvals').innerHTML=top('Fluxo de Aprovação','Decisão rápida, histórico claro e menos ruído entre criação e diretoria.')+'<div class="kanban">'+cols.map(function(col){return '<div class="column"><h4>'+col[0]+'</h4>'+col[1].map(function(e){return '<div class="task"><div class="row-title">'+e[2]+'</div><div class="row-sub">'+brands[e[1]].name+'</div><br>'+tag(e[1])+' '+status(e[3])+'<div style="margin-top:14px;display:flex;gap:8px"><button class="btn" style="padding:8px 10px">Revisar</button><button class="btn primary" style="padding:8px 10px">Aprovar</button></div></div>'}).join('')+'</div>'}).join('')+'</div>'}
